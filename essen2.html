<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essen Kasse</title>
    <script src="js/jspdf.umd.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --page: #f4f7fb;
            --page-soft: #eaf0f7;
            --ink: #172033;
            --muted: #627086;
            --line: #d9e2ec;
            --panel: rgba(255, 255, 255, 0.92);
            --panel-strong: #ffffff;
            --blue: #0f72ff;
            --blue-dark: #0758c9;
            --amber: #f5b301;
            --red: #e33247;
            --shadow: 0 18px 48px rgba(20, 35, 60, 0.12);
            --soft-shadow: 0 10px 28px rgba(20, 35, 60, 0.08);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(15, 114, 255, 0.12), transparent 34rem),
                linear-gradient(135deg, #f8fbff 0%, var(--page) 48%, var(--page-soft) 100%);
        }

        button,
        input {
            font: inherit;
        }

        button {
            min-height: 44px;
            border: 0;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.12s ease, box-shadow 0.18s ease, filter 0.18s ease, background 0.18s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        button:active {
            transform: translateY(0);
            filter: brightness(0.96);
        }

        .app-shell {
            width: min(1440px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 22px 0 32px;
        }

        .top-area {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            margin-bottom: 18px;
        }

        .title-block {
            min-width: 0;
        }

        .eyebrow {
            margin: 0 0 4px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            color: var(--blue);
            font-size: clamp(2rem, 3.4vw, 3.4rem);
            line-height: 1;
            letter-spacing: 0;
        }

        #top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .small-back-btn {
            min-height: 40px;
            padding: 0 14px;
            color: #243247;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            box-shadow: 0 6px 18px rgba(31, 45, 67, 0.08);
        }

        .pdf-toggle {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            min-height: 40px;
            padding: 0 13px;
            color: #26354d;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 6px 18px rgba(31, 45, 67, 0.06);
            user-select: none;
        }

        .pdf-toggle input {
            width: 17px;
            height: 17px;
            accent-color: var(--blue);
        }

        #container {
            display: grid;
            grid-template-columns: minmax(290px, 340px) minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }

        .left-panel,
        .right-panel {
            min-width: 0;
        }

        .left-panel {
            position: sticky;
            top: 16px;
            display: grid;
            gap: 16px;
        }

        .right-panel {
            display: block;
        }

        .card,
        #button-panel {
            background: var(--panel);
            border: 1px solid rgba(217, 226, 236, 0.9);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .card {
            padding: 16px;
        }

        #receipt-section {
            display: grid;
            gap: 14px;
            background:
                linear-gradient(180deg, rgba(15, 114, 255, 0.08), transparent 130px),
                var(--panel);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
        }

        .action-buttons button {
            padding: 0 10px;
            color: #fff;
            background: var(--blue);
            box-shadow: 0 9px 18px rgba(15, 114, 255, 0.22);
            white-space: normal;
            line-height: 1.1;
        }

        .action-buttons button:first-child {
            grid-column: 1 / -1;
            min-height: 50px;
            font-size: 1.04rem;
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
        }

        .action-buttons .remove-pfand {
            color: #231800;
            background: var(--amber);
            box-shadow: 0 9px 18px rgba(245, 179, 1, 0.24);
        }

        .action-buttons .card-payment {
            grid-column: 1 / -1;
            background: #172033;
            box-shadow: 0 9px 18px rgba(23, 32, 51, 0.2);
        }

        .action-buttons .reset {
            background: var(--red);
            box-shadow: 0 9px 18px rgba(227, 50, 71, 0.23);
        }

        .payment-status {
            min-height: 20px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .payment-status.pending {
            color: var(--blue);
        }

        .payment-status.success {
            color: #198754;
            font-weight: 700;
        }

        .payment-status.error {
            color: var(--red);
            font-weight: 700;
        }

        .card h3 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 0;
        }

        #receipt-section h3,
        #history-section h3 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: #25324a;
        }

        #receipt-section h3::after,
        #history-section h3::after {
            content: "";
            height: 1px;
            flex: 1;
            background: var(--line);
        }

        #receipt-list {
            min-height: 92px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        #receipt-list:empty {
            border: 1px dashed #c7d2df;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.58);
        }

        #receipt-list li {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 32px;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
            padding: 9px 9px 9px 12px;
            color: #26354d;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 4px 12px rgba(31, 45, 67, 0.06);
        }

        #receipt-list li span {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .delete-item-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            min-height: 32px;
            padding: 0;
            color: #fff;
            background: #d92f43;
            border-radius: 50%;
            box-shadow: none;
            font-size: 1.25rem;
            line-height: 1;
        }

        #total {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 52px;
            padding: 0 14px;
            color: #fff;
            background: #172033;
            border-radius: var(--radius);
            box-shadow: 0 12px 22px rgba(23, 32, 51, 0.18);
            font-size: 1.15rem;
            font-weight: 800;
        }

        #history-section {
            display: grid;
            gap: 12px;
        }

        #history-list {
            max-height: min(46vh, 440px);
            overflow-y: auto;
            padding-right: 4px;
        }

        #history-list p {
            margin: 0;
            color: var(--muted);
        }

        .bon-entry,
        #history-list .history-item {
            margin-bottom: 10px;
            padding: 12px;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 5px 14px rgba(31, 45, 67, 0.06);
        }

        .bon-entry strong {
            color: #0d5ed7;
        }

        .payment-badge {
            width: fit-content;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 0.82rem;
            font-weight: 800;
        }

        .payment-badge.card {
            color: #073b8f;
            background: #dce8ff;
        }

        .payment-badge.cash {
            color: #17483b;
            background: #e5f4ee;
        }

        .payment-badge small {
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 700;
        }

        .bon-entry ul,
        #history-list ul {
            margin: 8px 0 0;
            padding-left: 19px;
        }

        .toggle-history,
        .toggle-details {
            min-height: 36px;
            padding: 0 11px;
            color: #25324a;
            background: #eef4fb;
            border: 1px solid var(--line);
            box-shadow: none;
        }

        #button-panel {
            min-height: 560px;
            padding: 16px;
        }

        #artikel-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            width: 100%;
        }

        .warengruppe {
            position: relative;
            min-width: 0;
            padding: 14px;
            overflow: hidden;
            background-color: #fff !important;
            border: 1px solid rgba(217, 226, 236, 0.86);
            border-left-width: 6px !important;
            border-radius: var(--radius);
            box-shadow: var(--soft-shadow);
        }

        .warengruppe::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 3px;
            background: rgba(15, 114, 255, 0.08);
        }

        .warengruppe h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 12px;
            color: #172033;
            font-size: 1rem;
            line-height: 1.2;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
            gap: 9px;
        }

        .button-grid button {
            width: 100%;
            min-width: 0;
            min-height: 46px;
            padding: 6px 10px;
            color: #ffffff;
            border-radius: var(--radius);
            box-shadow: 0 9px 18px rgba(20, 35, 60, 0.16);
            font-size: 0.9rem;
            line-height: 1.12;
            white-space: normal;
            overflow-wrap: normal;
            word-break: normal;
        }

        .button-grid button:hover {
            box-shadow: 0 12px 22px rgba(20, 35, 60, 0.2);
        }

        @media (min-width: 1320px) {
            #artikel-buttons {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 1024px) {
            .app-shell {
                width: min(100% - 20px, 980px);
                padding-top: 14px;
            }

            .top-area {
                grid-template-columns: 1fr;
                align-items: start;
            }

            #top-bar {
                justify-content: flex-start;
            }

            #container {
                grid-template-columns: 1fr;
            }

            .left-panel {
                position: static;
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                align-items: start;
            }

            #artikel-buttons {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                width: min(100% - 14px, 640px);
            }

            h1 {
                font-size: 2rem;
            }

            #top-bar,
            .left-panel,
            #artikel-buttons {
                grid-template-columns: 1fr;
            }

            .small-back-btn,
            .pdf-toggle {
                width: 100%;
                justify-content: center;
            }

            #button-panel,
            .card {
                padding: 12px;
            }

            .button-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 430px) {
            .action-buttons {
                grid-template-columns: 1fr;
            }

            .action-buttons button:first-child {
                grid-column: auto;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="app-shell">
    <header class="top-area">
        <div class="title-block">
            <p class="eyebrow">TSV Auerbach Verkauf</p>
            <h1>Essen Kasse</h1>
        </div>

        <div id="top-bar">
            <button class="small-back-btn" onclick="window.location.href='index.html'">Zur&uuml;ck zum Dashboard</button>

            <label for="generate-pdf" class="pdf-toggle">
                <input type="checkbox" id="generate-pdf">
                PDF-Download (nur zum Testen)
            </label>
        </div>
    </header>

    <div id="container">
        <div class="left-panel">
            <section class="card" id="receipt-section" aria-label="Aktueller Bon">
                <div class="action-buttons">
                    <button onclick="finalizeBon()">Bon abschlie&szlig;en</button>
                    <button id="card-payment-btn" onclick="startCardPayment()" class="card-payment">Kartenzahlung</button>
                    <button onclick="removePfandItems()" class="remove-pfand">Pfand entfernen</button>
                    <button onclick="resetReceipt()" class="reset">Bon zur&uuml;cksetzen</button>
                </div>
                <div id="payment-status" class="payment-status"></div>
                <h3>Aktueller Bon</h3>
                <ul id="receipt-list"></ul>
                <div id="total">Summe: 0.00 &euro;</div>
            </section>

            <section class="card" id="history-section" aria-label="Historie">
                <h3>Historie</h3>
                <div id="history-list"></div>
            </section>
        </div>

        <div class="right-panel">
            <section id="button-panel" aria-label="Artikel">
                <div id="artikel-buttons"></div>
            </section>
        </div>
    </div>
</main>

<script>
    window.currentGUI = 'essen';
</script>
<script src="script.js"></script>
</body>
</html>
